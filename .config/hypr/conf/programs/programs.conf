# Set Noctalia shell call
$noctalia = qs -c noctalia-shell ipc call

# Set programs
$music = feishin
$media = jellyfin-desktop
$terminal = kitty
$terminal-float = kitty --class kitty-floating
$browser = librewolf
$privateBrowser = librewolf --private-window
$discord = ~/.dotfiles/scripts/discord.sh
$code = vscodium-insiders
$fileManager = thunar
$mail = thunderbird
$notes = obsidian

# Set commands
$menu = $noctalia launcher toggle
$desktop = ~/.dotfiles/scripts/desktop/toggle-shell.sh
$hyprcap = ~/.dotfiles/scripts/hyprcap.sh
$screenshot = hyprcap shot monitor:active --copy
$forceKillActive = kill -9 $(hyprctl activewindow -j | jq '.pid')