# [===Monitor=Workspace=Order===]
workspace = 1, monitor:DP-1, default:true, persistent:true
workspace = 2, monitor:DP-1, persistent:true
workspace = 3, monitor:DP-1, persistent:true
workspace = 4, monitor:HDMI-A-1, persistent:true
workspace = 5, monitor:HDMI-A-1, persistent:true
workspace = 6, monitor:HDMI-A-1, default:true, persistent:true

# [===Layer=Rules===]
layerrule = match:namespace noctalia-background-.*$, ignore_alpha 0.5, blur true, blur_popups true

# [===Ignore=Maximize===]
windowrule = match:class .*, suppress_event maximize

# [===Fix=XWayland=Dragging===]
windowrule = match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false, no_focus true

# [===Effects=Ignore=Fullscreen===]
windowrule = match:fullscreen true, no_blur true, no_dim true

# [===Gaming=Rules===]
windowrule = match:class (steam_app_.*), immediate yes, monitor DP-1, workspace 2
windowrule = match:class (gamescope), immediate yes, monitor DP-1, workspace 2
windowrule = match:class (endfield.exe), immediate yes, match:title (Endfield), float true, monitor DP-1, workspace 2
windowrule = match:class (cs2), immediate yes, monitor DP-1, workspace 2

# [===Main=Monitor=Apps===]
windowrule = match:class (librewolf), opaque true, no_initial_focus true, monitor DP-1, workspace 1
windowrule = match:class (librewolf), match:title (.*Private Browsing.*), monitor DP-1, workspace 2
windowrule = match:class (Minecraft.*), monitor DP-1, no_initial_focus true, fullscreen true, workspace 2
windowrule = match:class ([Pp]andora[Ll]auncher), match:title (Minecraft Game Output), monitor DP-1, workspace 2
windowrule = match:class (Unity), monitor DP-1, no_initial_focus true, workspace 2
windowrule = match:initial_class (wondershare filmora.exe), match:class (wondershare filmora.exe), match:title (Wondershare Filmora), tile true, opacity 1.0 1.0, no_blur true, no_initial_focus true, monitor DP-1, workspace 2

# [===Vertical=Monitor=Apps===]
windowrule = match:class ([Ss]team|[Hh]eroic|modrinth-app), monitor HDMI-A-1, workspace 5, no_initial_focus true
windowrule = match:class ([Dd]iscord-[Cc]anary|[Dd]iscord), monitor HDMI-A-1, workspace 6, no_initial_focus true
windowrule = match:class (feishin), monitor HDMI-A-1, workspace 6, no_initial_focus true

# [===Floating=Windows===]
windowrule = match:class ([Ww]aydroid|^waydroid\.com\..*$), size 1920 1080, float true, center true
windowrule = match:class (io.ente.auth), match:title (Ente Auth), size 770 1100, float true, center true
windowrule = match:class (kitty-floating), size 970 640, float true, center true
windowrule = match:class (blueman-manager|io.github.kaii_lb.Overskride), match:title (Bluetooth Devices|overskride), size 850 465, float true, center true
windowrule = match:class (org.pulseaudio.pavucontrol), match:title (Volume Control), size 600 800, float true, center true
windowrule = match:class (Bitwarden), size 900 850, float true, center true
windowrule = match:class (steam), match:title negative:([Ss]team), float true
windowrule = match:class (org.qbittorrent.qBittorrent), match:title negative:(^qBittorrent Enhanced Edition v[\d.]+$), float true
windowrule = match:class (org.gnome.FileRoller), float true
windowrule = match:class (solaar), size 1000 1000, float true, center true
windowrule = match:class ([Tt]hunar), match:workspace 1, size 1370 870, float true, center true
windowrule = match:class ([Tt]hunar), match:workspace 2, size 1370 870, float true, center true
windowrule = match:class ([Tt]hunar), match:workspace 3, size 1370 870, float true, center true
windowrule = match:class ([Tt]hunar), match:workspace 4, size 1050 870, float true, center true
windowrule = match:class ([Tt]hunar), match:workspace 5, size 1050 870, float true, center true
windowrule = match:class ([Tt]hunar), match:workspace 6, size 1050 870, float true, center true
windowrule = match:class ([Tt]hunar), match:title (File Operation Progress), size 600 110, float true
windowrule = match:class (virt-manager), match:title (Virtual Machine Manager), size 850 900, float true, center true
windowrule = match:class (nemo), size 1370 870, float true, center true
windowrule = match:class (unityhub), size 1300 800, float true, center true
windowrule = match:class (mpv|vlc), size 1420 840, float true
windowrule = match:class ([Ll]umafly), match:title ([Ll]umafly), float true, center true
windowrule = match:class (emote), float true, center false
windowrule = match:class (xdg-desktop-portal-gtk|xdg-desktop-portal-hyprland), size 1100 800 float true
windowrule = match:title (Visual Studio Installer), float true, center true
windowrule = match:title (Picture-in-Picture), float true

# [===Border=Colors===]
windowrule = match:class (librewolf), match:title (.*Private Browsing.*), border_color rgb(a020f0)
windowrule = match:class ([Ss]team|[Hh]eroic), border_color rgba(33ccffee)
windowrule = match:title ([Ss]team), border_color rgba(33ccffee)
windowrule = match:class (modrinth-app), border_color rgba(1bd96aff)
windowrule = match:class ([Dd]iscord-[Cc]anary|[Dd]iscord), border_color rgba(faa61aff)
windowrule = match:class (codium-insiders), border_color rgba(22a455ff)
windowrule = match:class ([Uu]nity|[Uu]nity[Hh]ub), border_color rgba(ffffffbf)